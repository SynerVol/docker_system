services:

  vite-app:
    build:
      context: ./vite-app
      args:
        REPO_URL: "https://github.com/SynerVol/WebPage.git"
    depends_on:
      - python-back
    ports:
      - "5173:5173"
    restart: unless-stopped
    networks:
      - drone-net

  python-back:
    build:
      context: ./python-back
      args:
        REPO_URL: https://github.com/SynerVol/MiddleWare.git
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    environment:
      - LEADER_PORT='tcp:192.168.1.23:5763'
      - FOLLOWER_PORT='tcp:192.168.1.23:5773'
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - drone-net

  mavproxy:
    build:
      context: ./mavproxy
      args:
        REPO_URL: https://github.com/SynerVol/Simulation_MavProxy.git
    devices:
      - "/dev/ttyACM0:/dev/video_drone"
    user: root
    ports:
      - "14550:14550/udp"
      - "14551:14551/udp"
    restart: unless-stopped
    command: >
      python /usr/local/bin/mavproxy.py
      --master=/dev/video_drone
      --baudrate 115200
      --out udpin:0.0.0.0:14550
      --out udpin:0.0.0.0:14551
      --daemon
      --nowait
      --non-interactive
    networks:
      - drone-net
    #devices:
    #  - /dev/ttyUSB0:/dev/ttyUSB0  # if using serial, adjust as needed

  ai-app:
    build:
      context: ./ai-app
      args:
        REPO_URL: https://github.com/SynerVol/yolo_drone.git
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - drone-net
    volumes:
      - ./screenshots:/tmp
      - /run/udev:/run/udev:ro
    devices:
      - "/dev/video0:/dev/video0"
      - "/dev/video10:/dev/video10"
      - "/dev/video11:/dev/video11"
      - "/dev/video12:/dev/video12"
      - "/dev/video13:/dev/video13"
      - "/dev/video14:/dev/video14"
      - "/dev/video15:/dev/video15"
      - "/dev/video16:/dev/video16"
      - "/dev/video18:/dev/video18"
      - "/dev/video19:/dev/video19"
      - "/dev/video20:/dev/video20"
      - "/dev/video21:/dev/video21"
      - "/dev/video22:/dev/video22"
      - "/dev/video23:/dev/video23"
      - "/dev/video31:/dev/video31"
    group_add:
      - video
    stdin_open: true
    tty: true

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel run
    networks:
      - drone-net
    depends_on:
      - vite-app

networks:
  drone-net:
    driver: bridge

